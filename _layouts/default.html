<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="app-shell">
      <header id="header_wrap" class="outer">
        <div class="site-container site-header">
          <a id="project_title" href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a>
          <div class="site-header__meta">
            <p class="site-header__updated">最終更新: {{ site.time | date: "%Y.%m.%d %H:%M" }}</p>
            <details class="side-nav-mobile">
              <summary class="side-nav-mobile__toggle" aria-label="Open navigation menu">
                <span class="side-nav-mobile__label">Guide</span>
                <span class="side-nav-mobile__icon" aria-hidden="true"></span>
              </summary>
              <nav class="side-nav-mobile__panel" aria-label="ドキュメント一覧">
                <h2 class="side-nav__title">Setup Guide</h2>
                {% include site-nav-links.html %}
              </nav>
            </details>
          </div>
        </div>
      </header>

      <div id="main_content_wrap" class="outer">
        <div class="site-container layout-shell">
          <aside class="side-nav" aria-label="ドキュメント一覧">
            <h2 class="side-nav__title">Setup Guide</h2>
            <nav>
              {% include site-nav-links.html %}
            </nav>
          </aside>

          <main id="main_content" class="main-content" role="main">
            <div class="content-card">
              {{ content }}
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
