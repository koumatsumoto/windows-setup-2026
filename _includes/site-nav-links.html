{% assign nav_pages = site.pages | where_exp: "page", "page.url contains '/docs/'" | sort: "title" %}
<ul class="side-nav__list">
  <li class="side-nav__item">
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
  </li>
  {% for nav_page in nav_pages %}
    <li class="side-nav__item">
      <a href="{{ nav_page.url | relative_url }}" {% if nav_page.url == page.url %}aria-current="page"{% endif %}>{{ nav_page.title }}</a>
    </li>
  {% endfor %}
</ul>
